<script>

  "use strict";

  const SQRT3 = Math.sqrt(3);
  const TAU = Math.PI * 2;
  const OFFSET_LABELS = ["A", "B", "C", "D", "E", "F"];

  function diagnostic(message, detail) {
    console.error("THEOREM ZERO CANONICAL VERIFICATION FAILED", message, detail || {});
    throw new Error(message);
  }

  function isPlainObject(value) {
    return Object.prototype.toString.call(value) === "[object Object]";
  }

  function strictDeepEqual(a, b) {
    if (Object.is(a, b)) return true;
    if (typeof a !== typeof b) return false;
    if (a === null || b === null) return false;
    if (Array.isArray(a) || Array.isArray(b)) {
      if (!Array.isArray(a) || !Array.isArray(b) || a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) if (!strictDeepEqual(a[i], b[i])) return false;
      return true;
    }
    if (isPlainObject(a) || isPlainObject(b)) {
      if (!isPlainObject(a) || !isPlainObject(b)) return false;
      const ak = Object.keys(a).sort();
      const bk = Object.keys(b).sort();
      if (!strictDeepEqual(ak, bk)) return false;
      for (const key of ak) if (!strictDeepEqual(a[key], b[key])) return false;
      return true;
    }
    return false;
  }

  function assertEqual(actual, expected, label) {
    if (!strictDeepEqual(actual, expected)) diagnostic(label + " mismatch.", { actual, expected });
  }

  function assertCondition(condition, label, detail) {
    if (!condition) diagnostic(label, detail);
  }

  function keyOf(q, r) {
    return q + "," + r;
  }

  function norm2(q, r) {
    return q * q + q * r + r * r;
  }

  function coordMapToList(map) {
    return Object.entries(map).map(([key, pair]) => ({ key, q: pair[0], r: pair[1] }));
  }

  function generateFromCentres(centres, offsets) {
    const centreSet = new Map();
    const generated = new Map();
    for (const centre of centres) {
      centreSet.set(keyOf(centre.q, centre.r), { q: centre.q, r: centre.r, role: "active_centre" });
      for (const label of OFFSET_LABELS) {
        const offset = offsets[label];
        const q = centre.q + offset[0];
        const r = centre.r + offset[1];
        generated.set(keyOf(q, r), { q, r, role: "generated_perimeter_station" });
      }
    }
    const catchment = new Map([...generated, ...centreSet]);
    return { centreSet, generated, catchment };
  }

  function shellDistribution(pointMap) {
    const out = {};
    for (const point of pointMap.values()) {
      const n = String(norm2(point.q, point.r));
      out[n] = (out[n] || 0) + 1;
    }
    return Object.fromEntries(Object.entries(out).sort((a, b) => Number(a[0]) - Number(b[0])));
  }

  function maximumReach(pointMap) {
    let max = 0;
    for (const point of pointMap.values()) max = Math.max(max, norm2(point.q, point.r));
    return Math.sqrt(max);
  }

  const ledgerElement = document.getElementById("theorem-zero-ledger");
  if (!ledgerElement) diagnostic("Ledger element is missing.");
  const ledger = JSON.parse(ledgerElement.textContent);

  const expectedIdentity = {
    title: "Theorem Zero — Canonical Substrate v1.0",
    version: "1.0.0",
    canonical_status: "canonical_substrate_v1_0",
    field_type: "triangular_barycentric"
  };
  const expectedOrientation = { A: "west", B: "north-west", C: "north-east", D: "east", E: "south-east", F: "south-west" };
  const expectedOffsets = { O: [0, 0], A: [-1, 0], B: [0, -1], C: [1, -1], D: [1, 0], E: [0, 1], F: [-1, 1] };
  const expectedFamilies = ["q = constant", "r = constant", "q + r = constant"];
  const expectedAuthorityModel = {
    substrate_definition: { authority: "canonical_locked", mutability: "fixed_for_v1_0", role: "defines the lawful infinite field" },
    activation_program: { authority: "programmable_on_substrate", mutability: "replaceable", role: "selects finite content from the substrate" },
    overlay_program: { authority: "programmable_expression", mutability: "replaceable", role: "expresses activated substrate content through constructional or relational marks" },
    rendering_program: { authority: "presentation_runtime", mutability: "replaceable", role: "controls timing, camera, still/animation mode, labels, colours, opacity, and other display parameters" }
  };
  const expectedSemanticPrecedence = {
    ledger_is_semantic_authority: true,
    substrate_definition_is_canonical_locked_for_v1_0: true,
    activation_program_is_programmable_on_substrate: true,
    overlay_program_is_programmable_expression_on_activation: true,
    rendering_program_is_replaceable_presentation_runtime: true,
    visual_layer_is_expression: true,
    construction_overlay_is_subordinate_to_substrate: true,
    on_mismatch: "Report ledger/runtime/visual inconsistency. Do not smooth over contradictions."
  };

  assertEqual({ title: ledger.title, version: ledger.version, canonical_status: ledger.canonical_status, field_type: ledger.field_type }, expectedIdentity, "canonical identity");
  assertEqual(ledger.radius_unit, 1, "radius unit");
  assertEqual(ledger.projection, {
    type: "axial_triangular",
    basis_q: [1, 0],
    basis_r: [0.5, -0.8660254037844386],
    squared_norm: "q^2 + q*r + r^2",
    screen_note: "The renderer may convert axial coordinates to screen coordinates, but screen coordinates are not the substrate."
  }, "projection");
  assertEqual(ledger.authority_model, expectedAuthorityModel, "authority model");
  assertEqual(ledger.semantic_precedence, expectedSemanticPrecedence, "semantic precedence");
  assertEqual(ledger.substrate_definition.authority, "canonical_locked", "substrate authority");
  assertEqual(ledger.substrate_definition.mutability, "fixed_for_v1_0", "substrate mutability");
  assertEqual(ledger.substrate_definition.role, "defines the lawful infinite field", "substrate role");
  assertEqual(ledger.substrate_definition.canonical_lock, true, "substrate canonical lock");
  assertEqual(ledger.substrate_definition.scope, "infinite", "substrate scope");
  assertEqual(ledger.substrate_definition.point_definition.point_set, "{ (q, r) | q in Z and r in Z }", "integer axial point-set statement");
  assertEqual(ledger.substrate_definition.step_definition.orientation, expectedOrientation, "orientation");
  assertEqual(ledger.substrate_definition.step_definition.unit_neighbour_offsets, expectedOffsets, "substrate offsets");
  assertEqual(ledger.substrate_definition.step_definition.first_circle_station_coordinates, expectedOffsets, "first-circle station coordinates");
  assertEqual(ledger.substrate_definition.carrier_family_definition.native_families, expectedFamilies, "native carrier families");
  assertEqual(ledger.final_field_state, {
    stage: "thirteen_circle_catchment",
    phase: "final_resolved_field_stations",
    circle_visibility: false,
    join_visibility: false,
    point_definition: "Resolved lawful field stations in the thirteen-circle catchment, not decorative particles.",
    line_family_source: "substrate_definition.carrier_family_definition.native_families"
  }, "final field state");
  assertEqual(Object.keys(ledger).sort(), [
    "activation_program",
    "authority_model",
    "canonical_status",
    "coordinate_convention",
    "explicit_statement",
    "field_type",
    "final_field_state",
    "overlay_program",
    "projection",
    "radius_unit",
    "rendering_program",
    "semantic_precedence",
    "substrate_definition",

    "verification_policy",
    "version"
  ], "single-source top-level ledger keys");

  assertEqual(ledger.activation_program.authority, expectedAuthorityModel.activation_program.authority, "activation authority");
  assertEqual(ledger.activation_program.mutability, expectedAuthorityModel.activation_program.mutability, "activation mutability");
  assertEqual(ledger.activation_program.role, expectedAuthorityModel.activation_program.role, "activation role");
  assertEqual(ledger.activation_program.substrate_contract, {
    coordinate_source: "substrate_definition.point_definition",
    offset_source: "substrate_definition.step_definition.unit_neighbour_offsets",
    carrier_source: "substrate_definition.carrier_family_definition.native_families",
    projection_source: "projection"
  }, "activation substrate contract");
  assertEqual(ledger.overlay_program.substrate_contract, {
    offset_source: "substrate_definition.step_definition.unit_neighbour_offsets",
    carrier_source: "substrate_definition.carrier_family_definition.native_families",
    square_grid_policy: "forbidden"
  }, "overlay substrate contract");
  assertCondition(ledger.overlay_program.orientation_disclosure.required_in_first_cycle === true, "Overlay must disclose first-cycle orientation.", ledger.overlay_program.orientation_disclosure);
  assertEqual(ledger.overlay_program.orientation_disclosure.labels, { O: "origin centre", A: "west", B: "north-west", C: "north-east", D: "east", E: "south-east", F: "south-west" }, "overlay orientation labels");
  assertEqual(ledger.rendering_program.data_consumption, "rendering consumes verified activation data derived from the ledger", "rendering data consumption");
  assertEqual(ledger.rendering_program.radius_policy, "mathematical_radius_fixed", "rendering radius policy");
  assertEqual(ledger.rendering_program.unit_relation_policy, "unit_neighbour_relation_fixed", "rendering unit relation policy");
  assertCondition(ledger.verification_policy.canonical_runtime_failure_mode === "hard_fail", "Verification policy must hard-fail on mismatch.", ledger.verification_policy);
  assertCondition(ledger.verification_policy.strict_deep_equality_required === true, "Verification policy must require strict deep equality.", ledger.verification_policy);

  assertEqual(ledger.activation_program.generation_rules, {
    per_active_centre_nominal_generation: 6,
    generated_perimeter_rule: "Apply the six substrate offsets A through F to each active centre.",
    unique_count_rule: "Duplicate viewer-native axial coordinates are identified exactly.",
    catchment_count_rule: "The catchment is the exact coordinate union of active centres and unique generated perimeter stations."
  }, "activation generation rules");

  const verifiedOffsets = ledger.substrate_definition.step_definition.unit_neighbour_offsets;
  const verifiedCarrierFamilies = ledger.substrate_definition.carrier_family_definition.native_families;

  const stageData = ledger.activation_program.stages.map(stage => {
    const centres = coordMapToList(stage.active_centres);
    for (const centre of centres) {
      assertCondition(Number.isInteger(centre.q) && Number.isInteger(centre.r), stage.key + " active centre must be an integer axial station.", centre);
    }
    const generated = generateFromCentres(centres, verifiedOffsets);
    assertEqual(stage.generated_perimeter_stations.nominal, centres.length * OFFSET_LABELS.length, stage.key + " nominal generated station count");
    assertEqual(stage.generated_perimeter_stations.unique, generated.generated.size, stage.key + " unique generated station count");
    assertEqual(stage.catchment, {
      active_centres: centres.length,
      unique_generated_perimeter_stations: generated.generated.size,
      total_unique_points: generated.catchment.size
    }, stage.key + " catchment counts");
    assertEqual(shellDistribution(generated.catchment), stage.shell_distribution_by_squared_norm, stage.key + " shell distribution");
    assertEqual(maximumReach(generated.catchment), stage.maximum_reach, stage.key + " maximum reach");
    assertEqual(ledger.rendering_program.stage_durations_ms[stage.key] > 0, true, stage.key + " rendering duration declared");
    assertEqual(ledger.rendering_program.view_reach[stage.key] > stage.maximum_reach, true, stage.key + " rendering view reach declared");
    return {
      key: stage.key,
      centres,
      duration: ledger.rendering_program.stage_durations_ms[stage.key],
      viewReach: ledger.rendering_program.view_reach[stage.key]
    };
  });

  assertEqual(stageData.map(stage => stage.key), ledger.activation_program.stage_order, "activation stage order");
  assertEqual(stageData.map(stage => stage.key), ["first_circle", "seven_circle_field", "thirteen_circle_catchment"], "reference activation stage order");

  const verifiedOrientationLabels = ledger.overlay_program.orientation_disclosure.labels;
  const canvas = document.getElementById("theorem-zero-canvas");
  const ctx = canvas.getContext("2d", { alpha: true });
  let dpr = 1;
  let width = 0;
  let height = 0;
  let screenCentre = { x: 0, y: 0 };
  let unit = 1;
  const totalDuration = stageData.reduce((sum, stage) => sum + stage.duration, 0);

  function resize() {
    const box = canvas.getBoundingClientRect();
    dpr = Math.max(1, window.devicePixelRatio || 1);
    width = Math.max(2, Math.floor(box.width * dpr));
    height = Math.max(2, Math.floor(box.height * dpr));
    if (canvas.width !== width || canvas.height !== height) {
      canvas.width = width;
      canvas.height = height;
    }
    screenCentre = { x: width / 2, y: height / 2 };
  }

  function axialToMath(q, r) {
    return { x: q + 0.5 * r, y: -(SQRT3 / 2) * r };
  }

  function mathToScreen(point, viewReach) {
    unit = Math.min(width, height) / (viewReach * 2);
    return { x: screenCentre.x + point.x * unit, y: screenCentre.y - point.y * unit };
  }

  function axialToScreen(q, r, viewReach) {
    return mathToScreen(axialToMath(q, r), viewReach);
  }

  function clamp01(x) { return Math.max(0, Math.min(1, x)); }
  function smooth(x) { x = clamp01(x); return x * x * (3 - 2 * x); }
  function pulse(a, b, x) { return smooth((x - a) / (b - a)); }
  function fadeOut(a, b, x) { return 1 - pulse(a, b, x); }
  function windowPulse(a, b, x) { return pulse(a, (a + b) / 2, x) * fadeOut((a + b) / 2, b, x); }

  function setStroke(color, alpha, lineWidth, glow) {
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth * dpr;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.shadowColor = color;
    ctx.shadowBlur = glow * dpr;
  }

  function setFill(color, alpha, glow) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = glow * dpr;
  }

  function drawPoint(q, r, viewReach, alpha, color, size) {
    if (alpha <= 0.002) return;
    const p = axialToScreen(q, r, viewReach);
    setFill(color, alpha, 6);
    ctx.beginPath();
    ctx.arc(p.x, p.y, size * dpr, 0, TAU);
    ctx.fill();
  }

  function drawCircle(q, r, viewReach, alpha, color, progress) {
    if (alpha <= 0.002) return;
    const p = axialToScreen(q, r, viewReach);
    setStroke(color, alpha, 1.05, 7);
    ctx.beginPath();
    ctx.arc(p.x, p.y, ledger.radius_unit * unit, -Math.PI / 2, -Math.PI / 2 + TAU * clamp01(progress));
    ctx.stroke();
  }

  function drawSegment(a, b, viewReach, alpha, color, lineWidth, progress) {
    if (alpha <= 0.002) return;
    const p = axialToScreen(a[0], a[1], viewReach);
    const q = axialToScreen(b[0], b[1], viewReach);
    const t = clamp01(progress == null ? 1 : progress);
    setStroke(color, alpha, lineWidth, 5);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    ctx.lineTo(p.x + (q.x - p.x) * t, p.y + (q.y - p.y) * t);
    ctx.stroke();
  }

  function fillTriangle(a, b, c, viewReach, alpha) {
    if (alpha <= 0.002) return;
    const p0 = axialToScreen(a[0], a[1], viewReach);
    const p1 = axialToScreen(b[0], b[1], viewReach);
    const p2 = axialToScreen(c[0], c[1], viewReach);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "rgba(100,255,210,0.20)";
    ctx.shadowColor = "rgba(100,255,210,1)";
    ctx.shadowBlur = 5 * dpr;
    ctx.beginPath();
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.closePath();
    ctx.fill();
  }

  function stationFor(label, centrePoint) {
    const offset = verifiedOffsets[label];
    return [centrePoint.q + offset[0], centrePoint.r + offset[1]];
  }

  function drawCarrierLine(p0, p1, viewReach, alpha, color) {
    if (alpha <= 0.002) return;
    const a = axialToScreen(p0[0], p0[1], viewReach);
    const b = axialToScreen(p1[0], p1[1], viewReach);
    setStroke(color, alpha, 0.58, 4);
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  function drawCarrierFamilies(viewReach, alpha, progress) {
    assertEqual(verifiedCarrierFamilies, ["q = constant", "r = constant", "q + r = constant"], "carrier families available to renderer");
    const range = Math.ceil(viewReach * 1.55);
    const long = range + 4;
    const qIn = pulse(0.00, 0.34, progress);
    const rIn = pulse(0.22, 0.60, progress);
    const sIn = pulse(0.46, 0.84, progress);
    for (let k = -range; k <= range; k++) {
      const edge = 1 - Math.min(1, Math.abs(k) / (range + 1));
      const a = alpha * (0.28 + 0.72 * edge);
      drawCarrierLine([k, -long], [k, long], viewReach, a * qIn, "rgba(100,255,210,1)");
      drawCarrierLine([-long, k], [long, k], viewReach, a * rIn, "rgba(143,185,255,1)");
      drawCarrierLine([-long, k + long], [long, k - long], viewReach, a * sIn, "rgba(234,255,247,1)");
    }
  }

  function drawCatchment(stage, viewReach, alpha) {
    const generated = generateFromCentres(stage.centres, verifiedOffsets);
    for (const point of generated.catchment.values()) {
      const isCentre = point.role === "active_centre";
      drawPoint(point.q, point.r, viewReach, alpha * (isCentre ? 0.95 : 0.76), isCentre ? "rgba(255,211,110,1)" : "rgba(100,255,210,1)", isCentre ? 1.9 : 1.35);
    }
  }

  function drawConstructionForCentre(centrePoint, viewReach, phase, stageKey, alphaSet) {
    if (alphaSet.cells > 0.002) {
      for (let i = 0; i < OFFSET_LABELS.length; i++) {
        fillTriangle([centrePoint.q, centrePoint.r], stationFor(OFFSET_LABELS[i], centrePoint), stationFor(OFFSET_LABELS[(i + 1) % OFFSET_LABELS.length], centrePoint), viewReach, alphaSet.cells);
      }
    }

    drawPoint(centrePoint.q, centrePoint.r, viewReach, alphaSet.centre, "rgba(255,211,110,1)", 3.25);
    drawCircle(centrePoint.q, centrePoint.r, viewReach, alphaSet.circle, centrePoint.key === "O" ? "rgba(255,211,110,1)" : "rgba(143,185,255,1)", alphaSet.circleDraw);


    for (let i = 0; i < OFFSET_LABELS.length; i++) {
      const label = OFFSET_LABELS[i];
      const station = stationFor(label, centrePoint);
      const appear = alphaSet.stations * pulse(0.05 + i * 0.055, 0.22 + i * 0.055, phase);
      drawPoint(station[0], station[1], viewReach, appear, "rgba(100,255,210,1)", 2.35);
      drawSegment([centrePoint.q, centrePoint.r], station, viewReach, alphaSet.radii, "rgba(100,255,210,1)", 0.9, pulse(0.22 + i * 0.025, 0.38 + i * 0.025, phase));
      const next = stationFor(OFFSET_LABELS[(i + 1) % OFFSET_LABELS.length], centrePoint);
      drawSegment(station, next, viewReach, alphaSet.chords, "rgba(234,255,247,1)", 0.95, pulse(0.40 + i * 0.025, 0.55 + i * 0.025, phase));
    }
  }

  function alphaSet(stageKey, phase) {
    const final = stageKey === "thirteen_circle_catchment";
    const field = final ? pulse(0.78, 0.90, phase) * fadeOut(0.972, 1, phase) : 0;
    return {
      centre: pulse(0.00, 0.08, phase) * (final ? Math.max(0.25, 1 - field * 0.70) : 1),
      circleDraw: pulse(0.07, 0.21, phase),
      circle: pulse(0.07, 0.21, phase) * fadeOut(0.62, final ? 0.76 : 0.72, phase),
      stations: pulse(0.16, 0.37, phase) * (final ? Math.max(0.25, 1 - field * 0.70) : 1),
      radii: pulse(0.30, 0.48, phase) * fadeOut(0.68, final ? 0.82 : 0.80, phase),
      chords: pulse(0.44, 0.61, phase) * fadeOut(0.68, final ? 0.82 : 0.80, phase),
      cells: pulse(0.52, 0.66, phase) * fadeOut(0.72, final ? 0.84 : 0.86, phase) * 0.62,
      carriers: final ? field : windowPulse(0.70, 0.98, phase),
      field
    };
  }

  function getStageAt(time) {
    let acc = 0;
    for (let i = 0; i < stageData.length; i++) {
      const end = acc + stageData[i].duration;
      if (time < end) return { index: i, phase: (time - acc) / stageData[i].duration };
      acc = end;
    }
    return { index: stageData.length - 1, phase: 1 };
  }

  function viewReachFor(index, phase) {
    const current = stageData[index];
    const next = stageData[(index + 1) % stageData.length];
    const k = pulse(0.90, 1.00, phase);
    return current.viewReach + (next.viewReach - current.viewReach) * k;
  }

  function paintBackground() {
    ctx.clearRect(0, 0, width, height);
    const gradient = ctx.createRadialGradient(screenCentre.x, screenCentre.y, 0, screenCentre.x, screenCentre.y, Math.min(width, height) * 0.56);
    gradient.addColorStop(0, "rgba(22,45,60,0.32)");
    gradient.addColorStop(1, "rgba(5,8,13,0)");
    ctx.globalAlpha = 1;
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);
  }

  function render(time) {
    resize();
    paintBackground();
    const t = ((time % totalDuration) + totalDuration) % totalDuration;
    const position = getStageAt(t);
    const stage = stageData[position.index];
    const phase = clamp01(position.phase);
    const viewReach = viewReachFor(position.index, phase);
    const alphas = alphaSet(stage.key, phase);

    for (let i = stage.centres.length - 1; i >= 0; i--) {
      const c = stage.centres[i];
      const delayed = i === 0 ? 1 : pulse(0.04 + i * 0.006, 0.22 + i * 0.006, phase);
      drawConstructionForCentre(c, viewReach, phase, stage.key, {
        centre: alphas.centre * (c.key === "O" ? 1 : 0.62 * delayed),
        circle: alphas.circle * (c.key === "O" ? 1 : 0.56 * delayed),
        circleDraw: alphas.circleDraw,
        stations: alphas.stations * (c.key === "O" ? 1 : 0.42 * delayed),
        radii: alphas.radii * (c.key === "O" ? 1 : 0.27 * delayed),
        chords: alphas.chords * (c.key === "O" ? 1 : 0.24 * delayed),
        cells: alphas.cells * (c.key === "O" ? 1 : 0.36 * delayed)
      });
    }

    if (stage.key === "thirteen_circle_catchment" && alphas.field > 0.002) {
      drawCatchment(stage, viewReach, alphas.field);
      drawCarrierFamilies(viewReach, alphas.field * 0.86, pulse(0.80, 0.92, phase));
    }

    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
    requestAnimationFrame(render);
  }
  resize();
  window.addEventListener("resize", resize);
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
