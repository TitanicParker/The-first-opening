<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The First Fixed Opening — HTML eBook</title>
  <meta http-equiv="refresh" content="0; url=first_fixed_opening_ebook/" />
  <style>
    :root {
      --bg: #05080d;
      --cyan: rgb(100, 255, 210);
      --gold: rgb(255, 211, 110);
      --text: rgba(234, 255, 247, 0.94);
      --muted: rgba(190, 222, 218, 0.72);
    }
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(22,45,60,.72), rgba(5,8,13,1) 66%),
        linear-gradient(180deg, #08131e, var(--bg));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(720px, calc(100vw - 40px));
      padding: 42px;
      border: 1px solid rgba(100,255,210,.28);
      border-radius: 28px;
      background: rgba(5,8,13,.72);
      box-shadow: 0 0 42px rgba(100,255,210,.16), inset 0 0 30px rgba(143,185,255,.08);
      text-align: center;
    }
    .mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      border-radius: 999px;
      border: 1px solid rgba(100,255,210,.4);
      box-shadow: 0 0 28px rgba(100,255,210,.28), inset 0 0 22px rgba(255,211,110,.14);
      background: radial-gradient(circle, rgba(255,211,110,.42), rgba(100,255,210,.16) 48%, rgba(5,8,13,.1) 70%);
    }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 4rem); letter-spacing: -.04em; }
    p { color: var(--muted); font-size: 1.1rem; line-height: 1.6; }
    a { color: var(--cyan); text-decoration-color: rgba(100,255,210,.42); }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true"></div>
    <h1>The First Fixed Opening</h1>
    <p>Opening the eBook…</p>
    <p><a href="first_fixed_opening_ebook/">Click here if the book does not open automatically.</a></p>
  </main>
</body>
</html>
